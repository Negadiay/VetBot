spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/vetbot
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

bot:
  token: ${BOT_TOKEN}
  username: medvet_booking_bot

clinic:
  name: "Ветеринарная клиника МЕДВЕТ"
  address: "ул. Ковпинца 12"
  phone: "+375441234567"

booking:
  horizon-days: 30
  dates-page-size: 8
  work-start: "09:00"
  work-end: "21:00"
  slot-minutes: 30
  times-page-size: 12
